{% extends "base.html" %}

{% block title %}Login - BKV Bank{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5">
        <div class="card glass-card shadow-lg border-0 rounded-4 overflow-hidden">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="bank-logo mb-3">
                        <span class="fs-1">🏦</span>
                    </div>
                    <h2 class="fw-bold text-gradient">Welcome Back</h2>
                    <p class="text-muted">Securely login to your BKV Bank account</p>
                </div>
                
                <form action="{{ url_for('login') }}" method="POST">
                    <div class="mb-4 form-floating">
                        <input type="number" class="form-control rounded-pill px-4 bg-transparent" id="acc_no" name="acc_no" placeholder="Account Number" required>
                        <label for="acc_no" class="px-4">Account Number</label>
                    </div>
                    <div class="mb-4 form-floating">
                        <input type="password" class="form-control rounded-pill px-4 bg-transparent" id="pin" name="pin" placeholder="PIN" required>
                        <label for="pin" class="px-4">4-Digit PIN</label>
                    </div>
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold btn-glow">Secure Login</button>
                    </div>
                </form>
                
                <div class="text-center mt-4">
                    <small class="text-muted">Test Account: Acc No: 1, PIN: 1234</small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
